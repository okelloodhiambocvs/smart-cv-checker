<!DOCTYPE html>
<html>
<head>
    <title>AjiraScan</title>
</head>
<body>

<h1>AjiraScan ATS Scanner</h1>

<form method="POST" action="/analyze">

<textarea name="cv" rows="12" cols="60"
placeholder="Paste CV here"></textarea>

<br><br>

<textarea name="job" rows="12" cols="60"
placeholder="Paste Job Description here"></textarea>

<br><br>

<button type="submit">
Analyze CV
</button>

<hr>

<h2>ATS Result</h2>

<p><strong>Score:</strong> {{.Score}}</p>

<p><strong>Job Type:</strong> {{.JobType}}</p>

</form>

</body>
</html>
